name: PR Build Check

on:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build (Release)
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up vcpkg binary cache credentials
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Unshallow vcpkg submodule
        shell: cmd
        run: git -C vcpkg fetch --unshallow

      - name: Download ScriptHookV SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://ntscorp.ru/dev-c/ScriptHookV_SDK_1.0.617.1a.zip" -OutFile "ScriptHookV_SDK.zip"
          Expand-Archive -Path "ScriptHookV_SDK.zip" -DestinationPath "ScriptHookV" -Force
          Remove-Item "ScriptHookV_SDK.zip"

      - name: Build
        shell: cmd
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: .\build.bat